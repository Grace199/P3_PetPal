# Render Blueprint — deploys the FastAPI backend, React frontend, and Postgres.
# Create the services by pointing Render at this repo (New + > Blueprint).
databases:
  - name: petpal-db
    plan: free
    databaseName: petpal
    user: petpal

services:
  # ---- FastAPI backend ----
  - type: web
    name: petpal-api
    runtime: python
    plan: free
    rootDir: backend_fastapi
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "gunicorn app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: petpal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # The frontend's public URL, e.g. https://petpal-web.onrender.com
      # (set this in the dashboard once petpal-web has a URL).
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # This service's own public URL, e.g. https://petpal-api.onrender.com
      # (used to build absolute media URLs; set after first deploy).
      - key: PUBLIC_BACKEND_URL
        sync: false
      # Persist uploaded media across deploys.
      - key: MEDIA_ROOT
        value: /var/data/media

    # Persistent disk so uploaded images survive redeploys.
    disk:
      name: petpal-media
      mountPath: /var/data
      sizeGB: 1

  # ---- React frontend (static site) ----
  - type: web
    name: petpal-web
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: build
    envVars:
      # Point the frontend at the backend API. Set this to the petpal-api URL.
      - key: REACT_APP_API_URL
        sync: false
    routes:
      # SPA fallback so client-side routes work on refresh.
      - type: rewrite
        source: /*
        destination: /index.html
