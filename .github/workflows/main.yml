name: CI

on:
  push:
    branches: ["main", "deployment", "debugging"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (FastAPI + SQLite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend_fastapi/requirements.txt

      - name: Install backend deps
        working-directory: backend_fastapi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (SQLite)
        working-directory: backend_fastapi
        run: alembic upgrade head

      - name: Import check
        working-directory: backend_fastapi
        run: python -c "from app.main import app; print('app imports OK')"

      - name: Backend tests
        working-directory: backend_fastapi
        run: pytest -q

  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Test
        working-directory: frontend
        env:
          CI: "true"
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build
        working-directory: frontend
        env:
          CI: "true"
        run: npm run build

  integration:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend_fastapi/requirements.txt

      - name: Install backend deps
        working-directory: backend_fastapi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start FastAPI server (background)
        working-directory: backend_fastapi
        run: |
          alembic upgrade head
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 >/tmp/uvicorn.log 2>&1 &
          sleep 2

      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/ && exit 0 || true
            sleep 1
          done
          echo "FastAPI did not start"
          echo "---- uvicorn log ----"
          cat /tmp/uvicorn.log
          exit 1

      - name: Smoke test a public endpoint
        run: |
          curl -fsS "http://127.0.0.1:8000/petlisting/" >/dev/null
